
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학교업무 링크 모음</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#333;line-height:1.5}
.header{background:#fff;border-bottom:2px solid #6c5ce7;padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.15rem;color:#2d3436}
.header .subtitle{font-size:.75rem;color:#999;margin-top:1px}
.header-right{display:flex;gap:8px;align-items:center}
.user-badge{font-size:.72rem;color:#6c5ce7;background:#f0eeff;padding:3px 10px;border-radius:12px}
.btn-sm{padding:5px 12px;border-radius:6px;border:1px solid #ddd;background:#fff;font-size:.75rem;cursor:pointer;transition:all .2s}
.btn-sm:hover{background:#f0f0f0}
.btn-sm.active{background:#6c5ce7;color:#fff;border-color:#6c5ce7}
.notice-banner{background:#ffeaa7;border-left:4px solid #fdcb6e;padding:9px 14px;margin:12px 16px 0;border-radius:6px;font-size:.8rem;display:flex;align-items:center;gap:8px}
.notice-banner .close-btn{margin-left:auto;cursor:pointer;font-size:1rem;color:#636e72;background:none;border:none}
.tab-bar{display:flex;gap:6px;padding:12px 16px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;align-items:center;flex-wrap:nowrap}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:.78rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab-btn.active{background:#6c5ce7;color:#fff;border-color:#6c5ce7}
.tab-btn .cnt{display:inline-block;background:rgba(0,0,0,.07);border-radius:10px;padding:1px 6px;font-size:.68rem;margin-left:3px}
.tab-btn.active .cnt{background:rgba(255,255,255,.25)}
.tab-btn.settings{margin-left:auto;border-color:#fdcb6e;color:#e67e22}
.tab-edit-btn{flex-shrink:0;width:26px;height:26px;border-radius:50%;border:1px dashed #bbb;background:#fff;font-size:.82rem;cursor:pointer;align-items:center;justify-content:center;color:#888;display:none}
body.admin-on .tab-edit-btn{display:flex}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:10px;padding:10px 16px 100px}
.card{background:#fff;border-radius:10px;padding:13px 15px;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;transition:all .18s;display:flex;flex-direction:column;gap:5px;position:relative;border:1.5px solid transparent}
.card:hover{border-color:#6c5ce7;box-shadow:0 3px 12px rgba(108,92,231,.12);transform:translateY(-1px)}
.card.secret{border-left:3px solid #fdcb6e;background:#fffdf5}
.card.locked{border-left:3px solid #ff7675}
.card.locked .card-title{color:#b2bec3}
.card .card-top{display:flex;align-items:center;justify-content:space-between}
.card .card-num{font-size:.68rem;color:#b2bec3;font-weight:600}
.card .card-icons{display:flex;gap:4px;align-items:center;font-size:.7rem}
.card .card-clicks{font-size:.68rem;color:#b2bec3}
.card .card-title{font-size:.9rem;font-weight:600;color:#2d3436;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card:hover .card-title{color:#6c5ce7}
.card .card-desc{font-size:.74rem;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:1px}
.card .card-author{font-size:.65rem;color:#b2bec3}
.cat-badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.67rem;font-weight:500}
.card-actions{display:none;position:absolute;top:8px;right:8px;gap:4px;z-index:5}
.card:hover .card-actions.can-edit{display:flex}
.card-actions button{width:26px;height:26px;border-radius:5px;border:none;background:rgba(240,240,240,.95);font-size:.72rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.card-actions button:hover{background:#ddd}
.empty-state{grid-column:1/-1;text-align:center;padding:40px 20px;color:#b2bec3;font-size:.85rem}
.fab-group{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:50}
.fab{width:48px;height:48px;border-radius:50%;border:none;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.15);transition:transform .2s}
.fab:hover{transform:scale(1.1)}
.fab-add{background:#6c5ce7;color:#fff}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;padding:24px}
.modal h2{font-size:1.05rem;margin-bottom:16px;color:#2d3436}
.modal label{display:block;font-size:.78rem;color:#636e72;margin-bottom:4px;margin-top:12px}
.modal label:first-of-type{margin-top:0}
.modal input,.modal select,.modal textarea{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:.85rem;font-family:inherit}
.modal input:focus,.modal select:focus{outline:none;border-color:#6c5ce7}
.chk-row{display:flex;align-items:center;gap:8px;margin-top:12px}
.chk-row input[type=checkbox]{width:auto}
.chk-row label{margin:0;font-size:.82rem}
.modal-btns{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.modal-btns button{padding:9px 20px;border-radius:8px;border:none;font-size:.85rem;cursor:pointer;font-weight:500}
.btn-cancel{background:#f0f0f0;color:#636e72}
.btn-save{background:#6c5ce7;color:#fff}
.btn-delete{background:#ff7675;color:#fff}
.btn-cancel:hover{background:#e0e0e0}
.btn-save:hover{background:#5a4bd1}
.cat-list{list-style:none;margin-top:10px}
.cat-list li{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0}
.cat-list li input[type=text]{flex:1}
.cat-list li input[type=color]{width:36px;height:30px;padding:1px;border-radius:6px;cursor:pointer;border:1px solid #ddd}
.cat-list li button{padding:4px 10px;border:none;border-radius:6px;font-size:.72rem;cursor:pointer;background:#ffe0e0;color:#c0392b}
@media(max-width:640px){
  .header{padding:10px 14px}
  .header h1{font-size:1rem}
  .user-badge{display:none}
  .notice-banner{margin:10px 10px 0;font-size:.76rem}
  .tab-bar{padding:10px 10px 6px}
  .card-grid{grid-template-columns:1fr;gap:8px;padding:8px 10px 100px}
  .card{padding:12px 13px}
  .modal{padding:20px;margin:8px}
}
@media(min-width:641px) and (max-width:1024px){.card-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1025px){
  .card-grid{grid-template-columns:repeat(3,1fr);max-width:1100px;margin:0 auto}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📎 학교업무 링크 모음</h1>
    <div class="subtitle" id="subTitle">등록순 정렬</div>
  </div>
  <div class="header-right">
    <span class="user-badge" id="userBadge"></span>
    <button class="btn-sm" id="btnAdmin">🔑 관리자</button>
  </div>
</div>

<div class="notice-banner" id="banner">

  <button class="close-btn" id="bannerClose">✕</button>
</div>

<div class="tab-bar" id="tabBar"></div>
<div class="card-grid" id="grid"></div>

<div class="fab-group">
  <button class="fab fab-add" id="fabAdd" title="새 링크 추가">＋</button>
</div>

<!-- 닉네임 -->
<div class="modal-overlay" id="mUser">
  <div class="modal">
    <h2>👋 환영합니다!</h2>
    <p style="font-size:.85rem;color:#636e72;margin-bottom:8px">닉네임을 입력하면 본인이 등록한 링크를 수정·삭제할 수 있습니다.</p>
    <label>닉네임</label>
    <input type="text" id="iUserName" placeholder="예: 김선생">
    <div class="modal-btns"><button class="btn-save" id="btnSetUser">확인</button></div>
  </div>
</div>

<!-- 관리자 로그인 -->
<div class="modal-overlay" id="mAdminLogin">
  <div class="modal">
    <h2>🔑 관리자 로그인</h2>
    <label>비밀번호</label>
    <input type="password" id="iAdminPw" placeholder="관리자 비밀번호">
    <div class="modal-btns">
      <button class="btn-cancel" data-close="mAdminLogin">취소</button>
      <button class="btn-save" id="btnAdminLogin">로그인</button>
    </div>
  </div>
</div>

<!-- 링크 추가/수정 -->
<div class="modal-overlay" id="mLink">
  <div class="modal">
    <h2 id="mLinkTitle">새 링크 추가</h2>
    <input type="hidden" id="iLinkId">
    <label>제목 *</label>
    <input type="text" id="iTitle" placeholder="링크 제목">
    <label>URL *</label>
    <input type="url" id="iUrl" placeholder="https://...">
    <label>설명</label>
    <input type="text" id="iDesc" placeholder="간단한 설명">
    <label>분야</label>
    <select id="iCat"></select>
    <div class="chk-row">
      <input type="checkbox" id="iSecret">
      <label for="iSecret">🔒 비밀링크 (나만 보기)</label>
    </div>
    <div class="chk-row" id="lockRow" style="display:none">
      <input type="checkbox" id="iLock">
      <label for="iLock">🔐 잠금 (관리자만 열기 가능)</label>
    </div>
    <div class="modal-btns">
      <button class="btn-delete" id="btnDelLink" style="display:none">삭제</button>
      <span style="flex:1"></span>
      <button class="btn-cancel" data-close="mLink">취소</button>
      <button class="btn-save" id="btnSaveLink">저장</button>
    </div>
  </div>
</div>

<!-- 관리자 설정 -->
<div class="modal-overlay" id="mSettings">
  <div class="modal">
    <h2>⚙️ 관리자 비밀번호 변경</h2>
    <label>새 비밀번호</label>
    <input type="password" id="iNewPw" placeholder="변경할 비밀번호">
    <label>비밀번호 확인</label>
    <input type="password" id="iNewPwC" placeholder="비밀번호 재입력">
    <div class="modal-btns">
      <button class="btn-cancel" data-close="mSettings">취소</button>
      <button class="btn-save" id="btnChangePw">변경</button>
    </div>
  </div>
</div>

<!-- 분야 관리 -->
<div class="modal-overlay" id="mCat">
  <div class="modal">
    <h2>📂 분야 관리</h2>
    <ul class="cat-list" id="catList"></ul>
    <div style="margin-top:14px;display:flex;gap:8px">
      <input type="text" id="iNewCatName" placeholder="새 분야 이름" style="flex:1">
      <input type="color" id="iNewCatColor" value="#6c5ce7" style="width:40px;padding:2px;border-radius:6px;cursor:pointer;border:1px solid #ddd">
      <button class="btn-save" style="padding:8px 14px;font-size:.8rem" id="btnAddCat">추가</button>
    </div>
    <div class="modal-btns"><button class="btn-cancel" data-close="mCat">닫기</button></div>
  </div>
</div>

function persist() {
  LS.set('s_cats', state.cats);
  LS.set('s_links', state.links);
  LS.set('s_pw', state.adminPw);
  LS.set('s_user', state.user);
  LS.set('s_nid', state.nextId);
}

// ====== Helpers ======
function $(id) { return document.getElementById(id); }
function openM(id) { $(id).classList.add('show'); }
function closeM(id) { $(id).classList.remove('show'); }
function getCat(id) {
  for (var i = 0; i < state.cats.length; i++) {
    if (state.cats[i].id === id) return state.cats[i];
  }
  return {label:'기타',color:'#888',bg:'#f0f0f0'};
}
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ====== Visible Links ======
function visibleLinks() {
  return state.links.filter(function(l) {
    if (state.isAdmin) return true;
    if (l.secret && l.author !== state.user) return false;
    return true;
  });
}

// ====== Render Tabs ======
function renderTabs() {
  var bar = $('tabBar');
  var vis = visibleLinks();
  var h = '';

  h += '<button class="tab-btn' + (state.filter === 'all' ? ' active' : '') + '" data-filter="all">전체 <span class="cnt">' + vis.length + '</span></button>';

  for (var i = 0; i < state.cats.length; i++) {
    var c = state.cats[i];
    var cnt = 0;
    for (var j = 0; j < vis.length; j++) { if (vis[j].cat === c.id) cnt++; }
    h += '<button class="tab-btn' + (state.filter === c.id ? ' active' : '') + '" data-filter="' + c.id + '">' + esc(c.label) + ' <span class="cnt">' + cnt + '</span></button>';
  }

  h += '<button class="tab-edit-btn" id="btnCatManage" title="분야 관리">⚙</button>';

  if (state.isAdmin) {
    h += '<button class="tab-btn settings" id="btnSettings">⚙ 설정</button>';
  }

  bar.innerHTML = h;
}

// ====== Render Cards ======
function renderCards() {
  var grid = $('grid');
  var vis = visibleLinks();
  var total = vis.length;

  if (state.filter !== 'all') {
    vis = vis.filter(function(l) { return l.cat === state.filter; });
  }

  $('subTitle').textContent = '등록순 정렬 · 총 ' + total + '건' + (state.isAdmin ? ' (관리자 모드)' : '');

  if (vis.length === 0) {
    grid.innerHTML = '<div class="empty-state">등록된 링크가 없습니다.</div>';
    return;
  }

  var h = '';
  for (var i = 0; i < vis.length; i++) {
    var item = vis[i];
    var c = getCat(item.cat);
    var isMine = (item.author === state.user);
    var canEdit = state.isAdmin || isMine;

    var cls = 'card';
    if (item.secret) cls += ' secret';
    if (item.locked && !state.isAdmin) cls += ' locked';

    var icons = '';
    if (item.secret) icons += '<span title="비밀링크">🔒</span> ';
    if (item.locked) icons += '<span title="잠금">🔐</span> ';

    h += '<div class="' + cls + '" data-linkid="' + item.id + '">';

    // 수정 버튼
    h += '<div class="card-actions' + (canEdit ? ' can-edit' : '') + '">';
    h += '<button data-edit="' + item.id + '" title="수정">✏️</button>';
    h += '</div>';

    h += '<div class="card-top">';
    h += '<span class="card-num">#' + (i + 1) + '</span>';
    h += '<div class="card-icons">' + icons + '<span class="card-clicks">👁 ' + item.clicks + '</span></div>';
    h += '</div>';
    h += '<div class="card-title">' + esc(item.title) + '</div>';
    h += '<div class="card-desc">' + esc(item.desc) + '</div>';
    h += '<div class="card-bottom">';
    h += '<span class="cat-badge" style="background:' + c.bg + ';color:' + c.color + '">' + esc(c.label) + '</span>';
    h += '<span class="card-author">' + esc(item.author) + '</span>';
    h += '</div>';
    h += '</div>';
  }
  grid.innerHTML = h;
}

function renderAll() { renderTabs(); renderCards(); }

// ====== Populate Category Select ======
function fillCatSelect() {
  var sel = $('iCat');
  var h = '';
  for (var i = 0; i < state.cats.length; i++) {
    h += '<option value="' + state.cats[i].id + '">' + esc(state.cats[i].label) + '</option>';
  }
  sel.innerHTML = h;
}

// ====== Render Category Manager ======
function renderCatList() {
  var ul = $('catList');
  var h = '';
  for (var i = 0; i < state.cats.length; i++) {
    var c = state.cats[i];
    h += '<li>';
    h += '<input type="color" value="' + c.color + '" data-catidx="' + i + '" data-field="color">';
    h += '<input type="text" value="' + esc(c.label) + '" data-catidx="' + i + '" data-field="label">';
    h += '<button data-delcat="' + i + '">삭제</button>';
    h += '</li>';
  }
  ul.innerHTML = h;
}

// ====== Event Listeners ======

// Banner close
$('bannerClose').addEventListener('click', function() { $('banner').style.display = 'none'; });

// Close modals with data-close
document.addEventListener('click', function(e) {
  var btn = e.target.closest('[data-close]');
  if (btn) { closeM(btn.getAttribute('data-close')); return; }

  // Close modal on overlay click
  var overlay = e.target.closest('.modal-overlay');
  if (overlay && e.target === overlay && overlay.id !== 'mUser') {
    closeM(overlay.id);
  }
});

// Tab click
$('tabBar').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-filter]');
  if (btn) {
    state.filter = btn.getAttribute('data-filter');
    renderAll();
    return;
  }
  if (e.target.closest('#btnCatManage')) { renderCatList(); openM('mCat'); return; }
  if (e.target.closest('#btnSettings')) { $('iNewPw').value = ''; $('iNewPwC').value = ''; openM('mSettings'); return; }
});

// Card click
$('grid').addEventListener('click', function(e) {
  // Edit button
  var editBtn = e.target.closest('[data-edit]');
  if (editBtn) {
    e.stopPropagation();
    var id = Number(editBtn.getAttribute('data-edit'));
    var item = null;
    for (var i = 0; i < state.links.length; i++) { if (state.links[i].id === id) { item = state.links[i]; break; } }
    if (!item) return;

    $('mLinkTitle').textContent = '링크 수정';
    $('iLinkId').value = id;
    $('iTitle').value = item.title;
    $('iUrl').value = item.url;
    $('iDesc').value = item.desc;
    $('iSecret').checked = item.secret;
    $('iLock').checked = item.locked;
    $('lockRow').style.display = state.isAdmin ? 'flex' : 'none';
    $('btnDelLink').style.display = 'inline-block';
    fillCatSelect();
    $('iCat').value = item.cat;
    openM('mLink');
    return;
  }

  // Card click → open link
  var card = e.target.closest('.card');
  if (card) {
    var lid = Number(card.getAttribute('data-linkid'));
    var lnk = null;
    for (var i = 0; i < state.links.length; i++) { if (state.links[i].id === lid) { lnk = state.links[i]; break; } }
    if (!lnk) return;
    if (lnk.locked && !state.isAdmin) { alert('🔐 이 링크는 잠겨 있습니다.\n관리자만 열 수 있습니다.'); return; }
    lnk.clicks++;
    persist();
    renderCards();
    if (lnk.url && lnk.url !== '#') window.open(lnk.url, '_blank');
  }
});

// FAB - add link
$('fabAdd').addEventListener('click', function() {
  $('mLinkTitle').textContent = '새 링크 추가';
  $('iLinkId').value = '';
  $('iTitle').value = '';
  $('iUrl').value = '';
  $('iDesc').value = '';
  $('iSecret').checked = false;
  $('iLock').checked = false;
  $('lockRow').style.display = state.isAdmin ? 'flex' : 'none';
  $('btnDelLink').style.display = 'none';
  fillCatSelect();
  openM('mLink');
  setTimeout(function(){ $('iTitle').focus(); }, 150);
});

// Save link
$('btnSaveLink').addEventListener('click', function() {
  var editId = $('iLinkId').value;
  var title = $('iTitle').value.trim();
  var url = $('iUrl').value.trim();
  var desc = $('iDesc').value.trim();
  var cat = $('iCat').value;
  var secret = $('iSecret').checked;
  var locked = $('iLock').checked;
  if (!title) { alert('제목을 입력해주세요.'); return; }
  if (!url) { alert('URL을 입력해주세요.'); return; }

  if (editId) {
    var id = Number(editId);
    for (var i = 0; i < state.links.length; i++) {
      if (state.links[i].id === id) {
        state.links[i].title = title;
        state.links[i].url = url;
        state.links[i].desc = desc;
        state.links[i].cat = cat;
        state.links[i].secret = secret;
        state.links[i].locked = locked;
        break;
      }
    }
  } else {
    state.links.push({id: state.nextId++, title: title, url: url, desc: desc, cat: cat, clicks: 0, author: state.user, secret: secret, locked: locked});
  }
  persist();
  closeM('mLink');
  renderAll();
});

// Delete link
$('btnDelLink').addEventListener('click', function() {
  var id = Number($('iLinkId').value);
  if (!id) return;
  var item = null;
  for (var i = 0; i < state.links.length; i++) { if (state.links[i].id === id) { item = state.links[i]; break; } }
  if (!item) return;
  if (!confirm('"' + item.title + '"\n이 링크를 삭제하시겠습니까?')) return;
  state.links = state.links.filter(function(l) { return l.id !== id; });
  persist();
  closeM('mLink');
  renderAll();
});

// Admin toggle
$('btnAdmin').addEventListener('click', function() {
  if (state.isAdmin) {
    state.isAdmin = false;
    document.body.classList.remove('admin-on');
    $('btnAdmin').classList.remove('active');
    $('btnAdmin').textContent = '🔑 관리자';
    renderAll();
    return;
  }
  $('iAdminPw').value = '';
  openM('mAdminLogin');
  setTimeout(function(){ $('iAdminPw').focus(); }, 150);
});

// Admin login
$('btnAdminLogin').addEventListener('click', doAdminLogin);
$('iAdminPw').addEventListener('keydown', function(e) { if (e.key === 'Enter') doAdminLogin(); });
function doAdminLogin() {
  if ($('iAdminPw').value === state.adminPw) {
    state.isAdmin = true;
    document.body.classList.add('admin-on');
    $('btnAdmin').classList.add('active');
    $('btnAdmin').textContent = '🔓 관리자 ON';
    closeM('mAdminLogin');
    renderAll();
  } else {
    alert('비밀번호가 올바르지 않습니다.');
  }
}

// Change admin password
$('btnChangePw').addEventListener('click', function() {
  var pw = $('iNewPw').value;
  var pwc = $('iNewPwC').value;
  if (!pw) { alert('비밀번호를 입력해주세요.'); return; }
  if (pw !== pwc) { alert('비밀번호가 일치하지 않습니다.'); return; }
  state.adminPw = pw;
  persist();
  alert('✅ 비밀번호가 변경되었습니다.');
  closeM('mSettings');
});

// Set username
$('btnSetUser').addEventListener('click', doSetUser);
$('iUserName').addEventListener('keydown', function(e) { if (e.key === 'Enter') doSetUser(); });
function doSetUser() {
  var name = $('iUserName').value.trim();
  if (!name) { alert('닉네임을 입력해주세요.'); return; }
  state.user = name;
  persist();
  $('userBadge').textContent = '👤 ' + name;
  closeM('mUser');
  renderAll();
}

// Category management
$('catList').addEventListener('change', function(e) {
  var el = e.target;
  var idx = Number(el.getAttribute('data-catidx'));
  var field = el.getAttribute('data-field');
  if (field === 'label') state.cats[idx].label = el.value;
  if (field === 'color') { state.cats[idx].color = el.value; state.cats[idx].bg = el.value + '18'; }
  persist();
  renderAll();
});
$('catList').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-delcat]');
  if (!btn) return;
  var idx = Number(btn.getAttribute('data-delcat'));
  var c = state.cats[idx];
  var cnt = 0;
  for (var i = 0; i < state.links.length; i++) { if (state.links[i].cat === c.id) cnt++; }
  if (cnt > 0 && !confirm('"' + c.label + '" 분야에 ' + cnt + '개의 링크가 있습니다.\n해당 링크는 첫 번째 분야로 이동됩니다. 삭제하시겠습니까?')) return;
  if (cnt > 0) {
    var fb = state.cats[0] ? state.cats[0].id : 'etc';
    for (var i = 0; i < state.links.length; i++) { if (state.links[i].cat === c.id) state.links[i].cat = fb; }
  }
  state.cats.splice(idx, 1);
  persist();
  renderCatList();
  renderAll();
});
$('btnAddCat').addEventListener('click', function() {
  var name = $('iNewCatName').value.trim();
  var color = $('iNewCatColor').value;
  if (!name) { alert('분야 이름을 입력해주세요.'); return; }
  state.cats.push({id: 'cat_' + Date.now(), label: name, color: color, bg: color + '18'});
  persist();
  $('iNewCatName').value = '';
  renderCatList();
  renderAll();
});

// ====== Init ======
if (!state.user) {
  openM('mUser');
  setTimeout(function(){ $('iUserName').focus(); }, 150);
} else {
  $('userBadge').textContent = '👤 ' + state.user;
}
renderAll();
</script>
</body>
</html>
